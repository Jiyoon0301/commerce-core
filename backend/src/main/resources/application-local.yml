spring:
  datasource:
    # 비밀번호 root로 수정 (도커 설정과 일치)
    url: jdbc:mysql://localhost:3307/commerce_db?serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update # create는 실행할 때마다 데이터가 날아가니 update 권장
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # H2Dialect -> MySQL8Dialect로 변경 필수
        # Dialect를 직접 명시하지 않아도 DB 접속 정보를 보고 알아서 찾아줍니다
#        dialect: org.hibernate.dialect.MySQL8Dialect

  data:
    redis:
      host: localhost
      port: 6379
      database: 0