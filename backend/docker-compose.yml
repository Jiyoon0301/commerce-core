version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: commerce-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: commerce_db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:latest
    container_name: commerce-redis
    ports:
      - "6379:6379"